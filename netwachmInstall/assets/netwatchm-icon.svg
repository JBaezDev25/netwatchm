<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- badge -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#0e1320" stroke="#26365c" stroke-width="5"/>

  <!-- ===== network the frenchie is watching (lower area) ===== -->
  <g stroke="#36d6c3" stroke-width="4" fill="none" opacity="0.9">
    <line x1="150" y1="432" x2="206" y2="454"/>
    <line x1="206" y1="454" x2="262" y2="430"/>
    <line x1="262" y1="430" x2="320" y2="454"/>
    <line x1="320" y1="454" x2="366" y2="432"/>
    <line x1="206" y1="454" x2="262" y2="430"/>
    <line x1="150" y1="432" x2="262" y2="430"/>
    <line x1="366" y1="432" x2="262" y2="430"/>
  </g>
  <!-- signal arcs rising from the centre node -->
  <g stroke="#36d6c3" fill="none" stroke-linecap="round">
    <path d="M222 424 A 44 44 0 0 1 302 424" stroke-width="5" opacity="0.85"/>
    <path d="M206 420 A 62 62 0 0 1 318 420" stroke-width="4" opacity="0.5"/>
    <path d="M190 416 A 80 80 0 0 1 334 416" stroke-width="4" opacity="0.28"/>
  </g>
  <g>
    <circle cx="150" cy="432" r="16" fill="#36d6c3" opacity="0.18"/>
    <circle cx="206" cy="454" r="16" fill="#36d6c3" opacity="0.18"/>
    <circle cx="320" cy="454" r="16" fill="#36d6c3" opacity="0.18"/>
    <circle cx="366" cy="432" r="16" fill="#36d6c3" opacity="0.18"/>
    <circle cx="262" cy="430" r="22" fill="#36d6c3" opacity="0.25"/>
    <circle cx="150" cy="432" r="8" fill="#3ee6cf"/>
    <circle cx="206" cy="454" r="8" fill="#3ee6cf"/>
    <circle cx="320" cy="454" r="8" fill="#3ee6cf"/>
    <circle cx="366" cy="432" r="8" fill="#3ee6cf"/>
    <circle cx="262" cy="430" r="11" fill="#7af3e3"/>
  </g>

  <!-- ===== frenchie ===== -->
  <!-- ears (broad rounded "bat ears") -->
  <path d="M210 192 C 206 130 196 92 172 90 C 150 88 134 104 132 134 C 131 160 140 182 150 196 Z" fill="#e7ebf2"/>
  <path d="M302 192 C 306 130 316 92 340 90 C 362 88 378 104 380 134 C 381 160 372 182 362 196 Z" fill="#e7ebf2"/>
  <path d="M202 184 C 199 138 191 110 174 109 C 156 108 146 122 145 146 C 145 166 152 178 160 188 Z" fill="#f3b6c2"/>
  <path d="M310 184 C 313 138 321 110 338 109 C 356 108 366 122 367 146 C 367 166 360 178 352 188 Z" fill="#f3b6c2"/>

  <!-- head -->
  <ellipse cx="256" cy="252" rx="120" ry="106" fill="#eef1f6"/>
  <!-- jowls -->
  <ellipse cx="204" cy="318" rx="58" ry="52" fill="#eef1f6"/>
  <ellipse cx="308" cy="318" rx="58" ry="52" fill="#eef1f6"/>
  <!-- soft eye-patch for character -->
  <ellipse cx="206" cy="248" rx="50" ry="46" fill="#dfe4ee"/>

  <!-- eyebrows (left one raised = playful) -->
  <path d="M176 206 q28 -16 58 -2" stroke="#c4ccda" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M286 212 q26 -10 52 0" stroke="#c4ccda" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- eyes (pupils look DOWN toward the network) -->
  <circle cx="210" cy="250" r="33" fill="#ffffff"/>
  <circle cx="302" cy="250" r="33" fill="#ffffff"/>
  <circle cx="212" cy="262" r="16" fill="#222834"/>
  <circle cx="300" cy="262" r="16" fill="#222834"/>
  <circle cx="218" cy="256" r="5.5" fill="#ffffff"/>
  <circle cx="306" cy="256" r="5.5" fill="#ffffff"/>

  <!-- muzzle -->
  <ellipse cx="256" cy="322" rx="74" ry="48" fill="#f7f9fc"/>
  <!-- nose -->
  <path d="M256 286 q26 4 24 24 q-2 16 -24 18 q-22 -2 -24 -18 q-2 -20 24 -24 Z" fill="#2a2f3a"/>
  <ellipse cx="247" cy="305" rx="3.4" ry="4.6" fill="#11151c"/>
  <ellipse cx="265" cy="305" rx="3.4" ry="4.6" fill="#11151c"/>
  <!-- mouth -->
  <path d="M256 328 L256 344 Q256 360 232 360 M256 344 Q256 360 280 360" stroke="#2a2f3a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- playful tongue -->
  <path d="M243 352 q13 -6 26 0 l0 18 q0 12 -13 12 q-13 0 -13 -12 Z" fill="#f4798f"/>
  <line x1="256" y1="354" x2="256" y2="376" stroke="#dd5f78" stroke-width="3"/>
</svg>
