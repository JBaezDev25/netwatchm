# /etc/systemd/journald.conf.d/netwatchm.conf
# Journal limits for NetWatchM — prevents log saturation
#
# Install: sudo cp this file /etc/systemd/journald.conf.d/netwatchm.conf
#          sudo systemctl restart systemd-journald

[Journal]
# Hard cap on total journal disk use
SystemMaxUse=200M

# Each individual journal file stays under 50 MB before rotating
SystemMaxFileSize=50M

# Keep at least 500 MB free on the disk at all times
SystemKeepFree=500M

# Delete journal entries older than 30 days automatically
MaxRetentionSec=30day

# Rate-limit log ingestion: max 500 messages per 10 s per service
# Prevents a runaway process from flooding the journal
RateLimitIntervalSec=10s
RateLimitBurst=500

# Compress journal files on disk
Compress=yes
