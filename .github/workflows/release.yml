name: Auto Version and Release

on:
  push:
    branches: [master]

# Skip if this is itself a version bump commit (prevents infinite loop)
# GITHUB_TOKEN pushes don't trigger workflows by default, but guard anyway.
jobs:
  release:
    name: Bump version, build exe, publish release
    if: "!startsWith(github.event.head_commit.message, 'Bump version to v')"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Compute new patch version ────────────────────────────────────────────
      - name: Compute next version
        id: version
        shell: bash
        run: |
          OLD=$(grep '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          IFS='.' read -r MAJ MIN PAT <<< "$OLD"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $OLD → $NEW"

      # ── Update version in all files ──────────────────────────────────────────
      - name: Update version files
        shell: bash
        run: |
          OLD="${{ steps.version.outputs.old }}"
          NEW="${{ steps.version.outputs.new }}"

          sed -i "s/version = \"$OLD\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/APP_VERSION  = \"$OLD\"/APP_VERSION  = \"$NEW\"/" netwachmInstall/installer_gui.py
          sed -i "s/\$AppVersion  = \"$OLD\"/\$AppVersion  = \"$NEW\"/" netwachmInstall/install.ps1
          # installer_version.txt: update x.y.z strings and (x, y, z, 0) tuples
          sed -i "s/$OLD/$NEW/g" netwachmInstall/installer_version.txt
          OLD_T=$(echo "$OLD" | sed 's/\./,\ /g')
          NEW_T=$(echo "$NEW" | sed 's/\./,\ /g')
          sed -i "s/(${OLD_T}, 0)/(${NEW_T}, 0)/g" netwachmInstall/installer_version.txt

      # ── Bundle source into installer ─────────────────────────────────────────
      - name: Create source bundle for installer
        shell: pwsh
        run: |
          # Build netwatchm-bundled/ folder (mirrors what GitHub zip provides)
          $bundle = 'netwachmInstall\netwatchm-bundled'
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item 'src'                  "$bundle\src"    -Recurse -Force
          Copy-Item 'netwatchm_server.py'  "$bundle\"       -Force
          Copy-Item 'pyproject.toml'       "$bundle\"       -Force
          Copy-Item 'netwatchm.yaml.example' "$bundle\"     -Force
          if (Test-Path 'assets') { Copy-Item 'assets' "$bundle\assets" -Recurse -Force }
          # Zip it so PyInstaller can embed it
          $zip = 'netwachmInstall\netwatchm-src.zip'
          Compress-Archive -Path $bundle -DestinationPath $zip -Force
          Remove-Item $bundle -Recurse -Force
          $size = [math]::Round((Get-Item $zip).Length / 1KB, 0)
          Write-Host "Source bundle ready: $zip ($size KB)"

      # ── Build exe ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller

      - name: Build netwatchm-setup.exe
        shell: pwsh
        run: pyinstaller netwachmInstall/installer.spec --clean --noconfirm

      - name: Verify output
        shell: pwsh
        run: |
          if (Test-Path "dist\netwatchm-setup.exe") {
            $size = [math]::Round((Get-Item "dist\netwatchm-setup.exe").Length / 1MB, 1)
            Write-Host "netwatchm-setup.exe built successfully ($size MB)"
          } else {
            Write-Error "netwatchm-setup.exe not found — build failed"
            exit 1
          }

      # ── Commit version bump + tag ────────────────────────────────────────────
      - name: Commit and tag new version
        shell: bash
        run: |
          NEW="${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml netwachmInstall/installer_gui.py netwachmInstall/install.ps1 netwachmInstall/installer_version.txt
          git commit -m "Bump version to v$NEW [skip ci]"
          git tag "v$NEW"
          git push origin master
          git push origin "v$NEW"

      # ── Publish GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new }}"
          name: "NetWatchM v${{ steps.version.outputs.new }}"
          body: |
            ## NetWatchM v${{ steps.version.outputs.new }}

            ### Windows Installation
            1. Download **netwatchm-setup.exe** below
            2. Double-click it
            3. Click **Yes** on the UAC prompt
            4. If SmartScreen appears: **More info → Run anyway**
            5. Watch the progress window — it installs everything automatically
            6. Click the **NetWatchM Dashboard** shortcut on your Desktop

            > The installer downloads the latest source from GitHub automatically.
            > No git or PowerShell required.

            ### Linux Installation
            ```bash
            git clone https://github.com/al4nbr3/netwatchm.git
            cd netwatchm
            bash netwachmInstall/install.sh
            ```

            See [INSTALL.md](https://github.com/al4nbr3/netwatchm/blob/master/netwachmInstall/INSTALL.md) for full instructions.
          files: dist/netwatchm-setup.exe
          draft: false
          prerelease: false
