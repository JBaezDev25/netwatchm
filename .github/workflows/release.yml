name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v0.1.0, v1.2.3

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build-windows:
    name: Build netwatchm-setup.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller uv

      - name: Install project dependencies
        run: uv sync --extra windows
        shell: pwsh

      - name: Build netwatchm-setup.exe
        run: pyinstaller netwachmInstall/installer.spec --clean --noconfirm
        shell: pwsh

      - name: Verify output
        run: |
          if (Test-Path "dist\netwatchm-setup.exe") {
            $size = [math]::Round((Get-Item "dist\netwatchm-setup.exe").Length / 1MB, 1)
            Write-Host "netwatchm-setup.exe built successfully ($size MB)"
          } else {
            Write-Error "netwatchm-setup.exe not found — build failed"
            exit 1
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NetWatchM ${{ github.ref_name }}"
          body: |
            ## NetWatchM ${{ github.ref_name }}

            ### Windows Installation
            1. Download **netwatchm-setup.exe** below
            2. Double-click it
            3. Click **Yes** on the UAC prompt
            4. If SmartScreen appears: **More info → Run anyway**
            5. Watch the progress window — it installs everything automatically
            6. Click the **NetWatchM Dashboard** shortcut on your Desktop

            > The installer downloads the latest source from GitHub automatically.
            > No git or PowerShell required.

            ### Linux Installation
            ```bash
            git clone https://github.com/al4nbr3/netwatchm.git
            cd netwatchm
            bash netwachmInstall/install.sh
            ```

            See [INSTALL.md](https://github.com/al4nbr3/netwatchm/blob/master/netwachmInstall/INSTALL.md) for full instructions.
          files: dist/netwatchm-setup.exe
          draft: false
          prerelease: false
